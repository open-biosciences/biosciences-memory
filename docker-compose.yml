name: biosciences-memory-local

services:
  # --- Core Database Layer ---
  neo4j:
    image: neo4j:5.26.0
    container_name: biosciences-neo4j
    ports:
      - "7475:7474" # Browser UI (Mapped to 7475 to avoid local clash)
      - "7688:7687" # Bolt Protocol (Mapped to 7688 to avoid local clash)
    environment:
      - NEO4J_AUTH=neo4j/demodemo
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - internal-net
    healthcheck:
      test: [ "CMD", "wget", "-O", "/dev/null", "http://localhost:7474" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Neo4j Cypher MCP Tool ---
  cypher-mcp:
    image: mcp/neo4j-cypher:latest
    container_name: biosciences-cypher-mcp
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # Internal Docker Networking
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=demodemo
      - NEO4J_DATABASE=neo4j
      # MCP Server Configuration
      - NEO4J_TRANSPORT=http
      - NEO4J_MCP_SERVER_HOST=0.0.0.0
      - NEO4J_MCP_SERVER_PORT=8005
      - NEO4J_MCP_SERVER_PATH=/mcp/
      - NEO4J_MCP_SERVER_ALLOWED_HOSTS=localhost,127.0.0.1
      - NEO4J_MCP_SERVER_ALLOW_ORIGINS=*
    ports:
      - "8008:8005" # Changed host port to 8008 to avoid allocation conflict
    networks:
      - internal-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',8005)); s.close()\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Biosciences Memory MCP Server ---
  memory-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.local-mcp
    container_name: biosciences-memory-mcp
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # Internal Database Connection
      - DATABASE_PROVIDER=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=demodemo
      - NEO4J_DATABASE=neo4j
      # LLM & Logic Configuration (Injected from host)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-dev_main}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8003
      # Logging Levels
      - OPENAI_LOG_LEVEL=${OPENAI_LOG_LEVEL:-DEBUG}
      - HTTPX_LOG_LEVEL=${HTTPX_LOG_LEVEL:-INFO}
      - GRAPHITI_LOG_LEVEL=${GRAPHITI_LOG_LEVEL:-DEBUG}
    ports:
      - "8007:8003" # Primary Application Entry Point
    networks:
      - internal-net
    command: [ "uv", "run", "src/biosciences_memory/server.py", "--port", "8003" ]
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',8003)); s.close()\"" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3

# --- Persistence Layer ---
volumes:
  neo4j_data:
    name: biosciences-neo4j-data
  neo4j_logs:
    name: biosciences-neo4j-logs

# --- Networking Layer ---
networks:
  internal-net:
    name: biosciences-internal-network
    driver: bridge